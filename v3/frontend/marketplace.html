<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Skill Binimoy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/marketplace.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
                <svg class="logo-icon" viewBox="0 0 50 50" fill="none" width="32" height="32"><circle cx="25" cy="25" r="23" stroke="url(#gs1)" stroke-width="3"/><path d="M15 25 L25 15 L35 25 L25 35 Z" fill="url(#gs1)"/><defs><linearGradient id="gs1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF"/><stop offset="100%" style="stop-color:#00C2FF"/></linearGradient></defs></svg>
                <span>Skill Binimoy</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
            <a href="marketplace.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Marketplace</span></a>
            <a href="requests.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Requests</span></a>
            <a href="sessions.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Sessions</span></a>
            <a href="chat.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Messages</span></a>
            <a href="profile.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer"><a href="#" class="nav-item logout" id="logoutBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-bar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search skills or users..." id="searchInput"></div>
            <div class="top-bar-actions">
                <button class="theme-toggle" id="themeToggle"><svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
                <div class="user-menu"><div class="user-avatar user-initials" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div></div>
            </div>
        </header>

        <div class="dashboard-content">
            <h2 style="margin-bottom:1.5rem">Marketplace</h2>
            <div id="usersGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem">
                <p style="color:var(--text-secondary)">Loading users...</p>
            </div>
        </div>
    </main>
</div>

<!-- Request Modal -->
<div class="modal" id="requestModal">
    <div class="modal-content">
        <button class="modal-close" id="requestModalClose">&times;</button>
        <div class="modal-body">
            <h2>Send Exchange Request</h2>
            <p id="requestModalSubtitle" style="color:var(--text-secondary);margin-bottom:1rem"></p>
            <div class="form-group"><label>Your Skill to Offer</label><input type="text" id="offeredSkill" placeholder="What skill will you teach?"></div>
            <div class="form-group"><label>Skill You Want to Learn</label><input type="text" id="requestedSkill" placeholder="What do you want to learn?"></div>
            <div class="form-group"><label>Message (optional)</label><textarea id="requestMessage" rows="3" placeholder="Introduce yourself..."></textarea></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="sendRequestBtn">Send Request</button>
                <button class="btn btn-outline" id="cancelRequestBtn">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
(function() {
    const API = window.API_URL;
    const token = localStorage.getItem('token');
    let selectedUserId = null;

    function getInitials(name) {
        return (name || 'U').split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
    }

    function renderUsers(users) {
        const grid = document.getElementById('usersGrid');
        if (!users.length) { grid.innerHTML = '<p style="color:var(--text-secondary)">No other users found. Invite friends to join!</p>'; return; }
        grid.innerHTML = users.map(u => `
            <div class="dashboard-card" style="padding:1.5rem">
                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
                    <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#00C2FF);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:1.1rem;flex-shrink:0">
                        ${u.profile_image ? `<img src="${u.profile_image}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : getInitials(u.full_name)}
                    </div>
                    <div>
                        <h3 style="margin:0;font-size:1rem">${u.full_name}</h3>
                        <p style="margin:0;color:var(--text-secondary);font-size:0.85rem">${u.bio || 'No bio yet'}</p>
                    </div>
                </div>
                ${u.skills_teach && u.skills_teach.length ? `<div style="margin-bottom:0.75rem"><p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.4rem">Can Teach:</p><div style="display:flex;flex-wrap:wrap;gap:0.4rem">${u.skills_teach.map(s => `<span style="background:rgba(108,99,255,0.15);color:#6C63FF;padding:2px 10px;border-radius:20px;font-size:0.8rem">${s}</span>`).join('')}</div></div>` : ''}
                ${u.skills_learn && u.skills_learn.length ? `<div style="margin-bottom:1rem"><p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.4rem">Wants to Learn:</p><div style="display:flex;flex-wrap:wrap;gap:0.4rem">${u.skills_learn.map(s => `<span style="background:rgba(0,194,255,0.15);color:#00C2FF;padding:2px 10px;border-radius:20px;font-size:0.8rem">${s}</span>`).join('')}</div></div>` : ''}
                <button class="btn btn-primary" style="width:100%" onclick="openRequest(${u.id}, '${u.full_name}')">Send Request</button>
            </div>`).join('');
    }

    window.openRequest = function(userId, name) {
        selectedUserId = userId;
        document.getElementById('requestModalSubtitle').textContent = `To: ${name}`;
        document.getElementById('requestModal').classList.add('active');
    };

    document.getElementById('requestModalClose').addEventListener('click', () => document.getElementById('requestModal').classList.remove('active'));
    document.getElementById('cancelRequestBtn').addEventListener('click', () => document.getElementById('requestModal').classList.remove('active'));

    document.getElementById('sendRequestBtn').addEventListener('click', async function() {
        const btn = this;
        btn.textContent = 'Sending...'; btn.disabled = true;
        try {
            const r = await fetch(API + '/api/users/requests', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({
                    receiver_id: selectedUserId,
                    offered_skill: document.getElementById('offeredSkill').value,
                    requested_skill: document.getElementById('requestedSkill').value,
                    message: document.getElementById('requestMessage').value
                })
            });
            const d = await r.json();
            if (r.ok) { showNotification(d.message, 'success'); document.getElementById('requestModal').classList.remove('active'); }
            else showNotification(d.message, 'error');
        } catch(e) { showNotification('Connection error', 'error'); }
        finally { btn.textContent = 'Send Request'; btn.disabled = false; }
    });

    // Search filter
    let allUsers = [];
    document.getElementById('searchInput').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        const filtered = allUsers.filter(u =>
            u.full_name.toLowerCase().includes(q) ||
            (u.skills_teach || []).some(s => s.toLowerCase().includes(q)) ||
            (u.skills_learn || []).some(s => s.toLowerCase().includes(q))
        );
        renderUsers(filtered);
    });

    // Load users
    fetch(API + '/api/users/all', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(d => { allUsers = d.users || []; renderUsers(allUsers); })
        .catch(() => document.getElementById('usersGrid').innerHTML = '<p style="color:var(--text-secondary)">Failed to load users.</p>');
})();
</script>
</body>
</html>
