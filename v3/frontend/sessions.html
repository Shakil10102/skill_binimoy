<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions - Skill Binimoy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer"><svg viewBox="0 0 50 50" fill="none" width="32" height="32"><circle cx="25" cy="25" r="23" stroke="url(#gs3)" stroke-width="3"/><path d="M15 25 L25 15 L35 25 L25 35 Z" fill="url(#gs3)"/><defs><linearGradient id="gs3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF"/><stop offset="100%" style="stop-color:#00C2FF"/></linearGradient></defs></svg><span>Skill Binimoy</span></div></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
            <a href="marketplace.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Marketplace</span></a>
            <a href="requests.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Requests</span></a>
            <a href="sessions.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Sessions</span></a>
            <a href="chat.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Messages</span></a>
            <a href="profile.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer"><a href="#" class="nav-item logout" id="logoutBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-bar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search..."></div>
            <div class="top-bar-actions">
                <button class="theme-toggle" id="themeToggle"><svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
                <div class="user-menu"><div class="user-avatar user-initials" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div></div>
            </div>
        </header>
        <div class="dashboard-content">
            <h2 style="margin-bottom:1.5rem">My Sessions</h2>
            <div id="sessionsList"><p style="color:var(--text-secondary)">Loading sessions...</p></div>
        </div>
    </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
(function() {
    const API = window.API_URL;
    const token = localStorage.getItem('token');
    const myId = JSON.parse(localStorage.getItem('user') || '{}').id;

    fetch(API + '/api/users/sessions', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(d => {
            const sessions = d.sessions || [];
            const list = document.getElementById('sessionsList');
            if (!sessions.length) { list.innerHTML = '<div class="dashboard-card"><p style="color:var(--text-secondary);text-align:center">No sessions yet. Accept requests to schedule sessions!</p></div>'; return; }
            const statusColors = { Upcoming: '#10b981', Completed: '#6C63FF', Cancelled: '#ef4444' };
            list.innerHTML = sessions.map(s => {
                const partner = s.sender_id == myId ? s.receiver_name : s.sender_name;
                const dt = new Date(s.scheduled_at);
                return `<div class="dashboard-card" style="padding:1.5rem;margin-bottom:1rem">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
                        <div>
                            <h3 style="margin:0">${s.offered_skill} ↔ ${s.requested_skill}</h3>
                            <p style="margin:0.25rem 0 0;color:var(--text-secondary)">with ${partner}</p>
                        </div>
                        <span style="background:${statusColors[s.status]}22;color:${statusColors[s.status]};padding:3px 12px;border-radius:20px;font-size:0.8rem;font-weight:500">${s.status}</span>
                    </div>
                    <div style="margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem">
                        <div style="background:var(--bg-secondary,rgba(108,99,255,0.08));border-radius:8px;padding:0.75rem"><p style="margin:0;font-size:0.8rem;color:var(--text-secondary)">Date & Time</p><p style="margin:0.25rem 0 0;font-weight:500">${dt.toLocaleDateString()} ${dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</p></div>
                        <div style="background:var(--bg-secondary,rgba(108,99,255,0.08));border-radius:8px;padding:0.75rem"><p style="margin:0;font-size:0.8rem;color:var(--text-secondary)">Duration</p><p style="margin:0.25rem 0 0;font-weight:500">${s.duration_minutes} min</p></div>
                        ${s.meeting_link ? `<div style="background:var(--bg-secondary,rgba(108,99,255,0.08));border-radius:8px;padding:0.75rem"><p style="margin:0;font-size:0.8rem;color:var(--text-secondary)">Meeting</p><a href="${s.meeting_link}" target="_blank" style="color:#6C63FF;font-weight:500">Join Session →</a></div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }).catch(() => document.getElementById('sessionsList').innerHTML = '<p style="color:var(--text-secondary)">Failed to load sessions.</p>');
})();
</script>
</body>
</html>
