<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Skill Binimoy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .chat-container { display:grid; grid-template-columns:280px 1fr; height:calc(100vh - 70px); }
        .chat-users { border-right:1px solid var(--border, #2a2a3a); overflow-y:auto; }
        .chat-user-item { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.25rem; cursor:pointer; border-bottom:1px solid var(--border, #2a2a3a); transition:background 0.2s; }
        .chat-user-item:hover, .chat-user-item.active { background:rgba(108,99,255,0.1); }
        .chat-messages { display:flex; flex-direction:column; }
        .messages-area { flex:1; overflow-y:auto; padding:1.5rem; display:flex; flex-direction:column; gap:0.75rem; }
        .msg { max-width:70%; padding:0.75rem 1rem; border-radius:12px; font-size:0.9rem; line-height:1.5; }
        .msg-sent { background:linear-gradient(135deg,#6C63FF,#00C2FF); color:white; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg-received { background:var(--card-bg, #1a1a2e); color:var(--text-primary, #fff); align-self:flex-start; border-bottom-left-radius:4px; border:1px solid var(--border, #2a2a3a); }
        .msg-time { font-size:0.7rem; opacity:0.7; margin-top:0.25rem; }
        .chat-input-area { padding:1rem 1.5rem; border-top:1px solid var(--border, #2a2a3a); display:flex; gap:0.75rem; }
        .chat-input-area input { flex:1; padding:0.75rem 1rem; border-radius:25px; border:1px solid var(--border, #2a2a3a); background:var(--card-bg, #1a1a2e); color:var(--text-primary, #fff); outline:none; }
        .chat-placeholder { display:flex; align-items:center; justify-content:center; flex:1; color:var(--text-secondary); }
        .unread-badge { background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:0.7rem; display:flex; align-items:center; justify-content:center; margin-left:auto; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer"><svg viewBox="0 0 50 50" fill="none" width="32" height="32"><circle cx="25" cy="25" r="23" stroke="url(#gs4)" stroke-width="3"/><path d="M15 25 L25 15 L35 25 L25 35 Z" fill="url(#gs4)"/><defs><linearGradient id="gs4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF"/><stop offset="100%" style="stop-color:#00C2FF"/></linearGradient></defs></svg><span>Skill Binimoy</span></div></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
            <a href="marketplace.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span>Marketplace</span></a>
            <a href="requests.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Requests</span></a>
            <a href="sessions.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Sessions</span></a>
            <a href="chat.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Messages</span></a>
            <a href="profile.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer"><a href="#" class="nav-item logout" id="logoutBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Logout</span></a></div>
    </aside>

    <main class="main-content" style="padding:0">
        <div class="chat-container">
            <div class="chat-users" id="chatUsersList"><p style="padding:1rem;color:var(--text-secondary)">Loading...</p></div>
            <div class="chat-messages" id="chatArea">
                <div class="chat-placeholder"><p>Select a user to start chatting</p></div>
            </div>
        </div>
    </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
(function() {
    const API = window.API_URL;
    const token = localStorage.getItem('token');
    const myId = JSON.parse(localStorage.getItem('user') || '{}').id;
    let currentUserId = null;
    let pollInterval = null;

    function getInitials(name) { return (name||'U').split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2); }

    function loadChatUsers() {
        // Load from marketplace users (users in database)
        fetch(API + '/api/users/all', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.json()).then(d => {
                const users = d.users || [];
                const list = document.getElementById('chatUsersList');
                if (!users.length) { list.innerHTML = '<p style="padding:1rem;color:var(--text-secondary)">No users to chat with yet.</p>'; return; }
                list.innerHTML = users.map(u => `
                    <div class="chat-user-item" id="chatUser_${u.id}" onclick="openChat(${u.id},'${u.full_name}')">
                        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#00C2FF);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;flex-shrink:0;font-size:0.85rem">${getInitials(u.full_name)}</div>
                        <div style="flex:1;min-width:0"><p style="margin:0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.full_name}</p></div>
                    </div>`).join('');
            });
    }

    window.openChat = function(userId, name) {
        currentUserId = userId;
        document.querySelectorAll('.chat-user-item').forEach(el => el.classList.remove('active'));
        const el = document.getElementById('chatUser_' + userId);
        if (el) el.classList.add('active');

        document.getElementById('chatArea').innerHTML = `
            <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border,#2a2a3a);display:flex;align-items:center;gap:0.75rem">
                <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#00C2FF);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:0.85rem">${getInitials(name)}</div>
                <h3 style="margin:0">${name}</h3>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="btn btn-primary" onclick="sendMsg()">Send</button>
            </div>`;
        loadMessages();
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(loadMessages, 3000);
    };

    function loadMessages() {
        if (!currentUserId) return;
        fetch(API + '/api/users/messages/' + currentUserId, { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.json()).then(d => {
                const area = document.getElementById('messagesArea');
                if (!area) return;
                const msgs = d.messages || [];
                area.innerHTML = msgs.length ? msgs.map(m => `
                    <div>
                        <div class="msg ${m.sender_id == myId ? 'msg-sent' : 'msg-received'}">${m.message}</div>
                        <div class="msg-time" style="text-align:${m.sender_id == myId ? 'right' : 'left'}">${new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>`).join('') : '<p style="text-align:center;color:var(--text-secondary);margin-top:2rem">No messages yet. Say hi! 👋</p>';
                area.scrollTop = area.scrollHeight;
            });
    }

    window.sendMsg = async function() {
        const input = document.getElementById('msgInput');
        const msg = input.value.trim();
        if (!msg || !currentUserId) return;
        input.value = '';
        try {
            await fetch(API + '/api/users/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ receiver_id: currentUserId, message: msg })
            });
            loadMessages();
        } catch(e) { showNotification('Failed to send', 'error'); }
    };

    loadChatUsers();
})();
</script>
</body>
</html>
