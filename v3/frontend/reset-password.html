<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Skill Binimoy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="auth-container">
    <div class="animated-bg">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>
    <div class="auth-wrapper">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;justify-content:center;display:flex;align-items:center;gap:8px;margin-bottom:1rem">
                    <svg viewBox="0 0 50 50" fill="none" width="36" height="36"><circle cx="25" cy="25" r="23" stroke="url(#gl1)" stroke-width="3"/><path d="M15 25 L25 15 L35 25 L25 35 Z" fill="url(#gl1)"/><defs><linearGradient id="gl1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF"/><stop offset="100%" style="stop-color:#00C2FF"/></linearGradient></defs></svg>
                    <span style="font-size:1.25rem;font-weight:700">Skill Binimoy</span>
                </div>
                <h2>Reset Password</h2>
                <p>Enter the code sent to your Gmail and your new password</p>
            </div>
            <div id="errorMsg" style="display:none;background:#ef444422;color:#ef4444;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem"></div>
            <div id="successMsg" style="display:none;background:#10b98122;color:#10b981;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@gmail.com" class="form-control">
            </div>
            
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="code" placeholder="123456" maxlength="6" class="form-control" style="text-align:center;letter-spacing:5px">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Min 6 characters" class="form-control">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" class="form-control">
            </div>
            
            <button class="btn btn-primary btn-full" id="resetBtn" style="width:100%;margin-top:0.5rem">Reset Password</button>
            
            <p style="text-align:center;margin-top:1.5rem;color:var(--text-secondary)">Back to <a href="login.html" style="color:#6C63FF;font-weight:500">Login</a></p>
        </div>
    </div>
</div>
<script src="js/config.js"></script>
<script>
// Auto-fill email if available
document.getElementById('email').value = localStorage.getItem('reset_email') || '';

document.getElementById('resetBtn').addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();
    const code = document.getElementById('code').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errEl = document.getElementById('errorMsg');
    const succEl = document.getElementById('successMsg');
    
    errEl.style.display = 'none';
    succEl.style.display = 'none';

    if (!email || !code || !newPassword || !confirmPassword) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
    }

    if (newPassword.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
    }

    if (newPassword !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
    }

    this.textContent = 'Resetting...'; this.disabled = true;
    try {
        const r = await fetch(window.API_URL + '/api/users/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, newPassword })
        });
        const d = await r.json();
        
        if (r.ok) {
            succEl.textContent = d.message;
            succEl.style.display = 'block';
            localStorage.removeItem('reset_email');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            errEl.textContent = d.message || 'Failed to reset password.';
            errEl.style.display = 'block';
            this.textContent = 'Reset Password'; this.disabled = false;
        }
    } catch(e) {
        errEl.textContent = 'Cannot connect to server. Please try again.';
        errEl.style.display = 'block';
        this.textContent = 'Reset Password'; this.disabled = false;
    }
});
</script>
</body>
</html>
